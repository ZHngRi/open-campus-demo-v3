<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCap Manager</title>
<style>
*{box-sizing:border-box}
body{font-family:monospace;max-width:900px;margin:20px auto;padding:10px;background:#111;color:#eee}
button,input{padding:6px 12px;margin:3px;font-family:inherit;border:1px solid #555;background:#333;color:#eee;cursor:pointer}
button:hover{background:#444}
button:disabled{opacity:.5;cursor:not-allowed}
.section{border:1px solid #333;padding:12px;margin:10px 0;border-radius:4px}
h2{font-size:16px;margin:0 0 8px;color:#0cf}
.file{border:1px solid #222;padding:6px;margin:4px 0;cursor:pointer}
.file:hover{background:#222}
.result{margin:5px 0;padding:4px;font-size:13px}
.result.ok{color:#0f0}.result.err{color:#f44}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #0cf;border-top-color:transparent;border-radius:50%;animation:s .6s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
#toast{position:fixed;top:20px;right:20px;z-index:999}
.toast{padding:10px 16px;margin-bottom:8px;border-radius:4px;font-size:14px;animation:in .3s ease;max-width:400px}
.toast.err{background:#c0392b;color:#fff}
.toast.ok{background:#27ae60;color:#fff}
.toast.info{background:#2980b9;color:#fff}
@keyframes in{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<h1>OpenCap Manager</h1>
<div id="toast"></div>

<div class="section">
  <h2>Upload Video</h2>
  <input type="file" id="videoFile" accept=".mp4,.mov">
  <button id="btnUpload" onclick="uploadVideo()">Upload</button>
  <div id="uploadMsg" class="result"></div>
</div>

<div class="section">
  <h2>Waiting to Send to OpenCap API</h2>
  <div id="pendingList">None</div>
</div>

<div class="section">
  <h2>Sessions <button id="btnRefresh" onclick="loadSessions()">Refresh</button></h2>
  <div id="sessionsList">Loading...</div>
</div>

<div class="section">
  <h2>Files</h2>
  <div id="filesPanel">Click a session to view files</div>
</div>

<div class="section">
  <h2>Current Active</h2>
  <div style="margin:4px 0">
    <b>IK (trc):</b> <input type="text" id="activeIK" style="width:70%;background:#222;color:#0cf;border:1px solid #555;padding:3px" placeholder="receiver-side .trc path">
  </div>
  <div style="margin:4px 0">
    <b>SO (mot):</b> <input type="text" id="activeSO" style="width:70%;background:#222;color:#f0c;border:1px solid #555;padding:3px" placeholder="receiver-side .mot path">
  </div>
  <button onclick="saveActive()">Save</button>
</div>

<div class="section">
  <h2>Send</h2>
  <label>Host: <input type="text" id="receiverHost" value="100.82.248.104" size="16"></label>
  <label>TRC: <input type="number" id="trcPort" value="5005" style="width:70px"></label>
  <label>MOT: <input type="number" id="motPort" value="5006" style="width:70px"></label>
  <button onclick="sendActive()">Add to Send Queue (IK+SO)</button>
  <div id="sendMsg" class="result"></div>
  <div id="queuePanel" style="margin-top:8px"></div>
</div>

<script>
function toast(msg, type) {
  type = type || "info";
  var el = document.createElement("div");
  el.className = "toast " + type;
  el.textContent = msg;
  document.getElementById("toast").appendChild(el);
  setTimeout(function(){ el.style.opacity = "0"; el.style.transition = "opacity .3s"; }, 3000);
  setTimeout(function(){ el.remove(); }, 3300);
}

async function rawFetch(method, url, body) {
  var opts = {method: method};
  if (body && body instanceof FormData) {
    opts.body = body;
  } else if (body) {
    opts.headers = {"Content-Type": "application/json"};
    opts.body = JSON.stringify(body);
  }
  var r = await fetch(url, opts);
  if (!r.ok) {
    var txt = await r.text();
    throw new Error(r.status + " " + txt.slice(0, 150));
  }
  return r.json();
}

// ---- Upload ----
async function uploadVideo() {
  var f = document.getElementById("videoFile").files[0];
  if (!f) return toast("Please choose a file first", "err");
  var btn = document.getElementById("btnUpload");
  btn.disabled = true; btn.textContent = "Uploading...";
  var fd = new FormData();
  fd.append("file", f);
  try {
    var data = await rawFetch("POST", "/videos/upload", fd);
    toast("Upload complete: " + data.session_id, "ok");
    document.getElementById("uploadMsg").innerHTML = '<span class="result ok">' + data.session_id + '</span>';
    loadSessions();
  } catch (e) {
    toast("Upload failed: " + e.message, "err");
  }
  btn.disabled = false; btn.textContent = "Upload";
}

// ---- Sessions ----
function esc(v) {
  return String(v == null ? "" : v)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function jsArg(v) {
  return String(v == null ? "" : v).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
}

function isPendingUpload(s) {
  return s.video_path && !s.api_session_id && s.status !== "processing" && s.status !== "done";
}

var autoRefreshTimer = null;
var loadingSessions = false;

function needsAutoRefresh(sessions) {
  for (var i = 0; i < sessions.length; i++) {
    var s = sessions[i];
    if (s.status === "processing" || s.download_status === "downloading") return true;
  }
  return false;
}

function updateAutoRefresh(sessions) {
  var shouldRun = needsAutoRefresh(sessions);
  if (shouldRun && !autoRefreshTimer) {
    autoRefreshTimer = setInterval(function() {
      loadSessions({silent: true});
    }, 10000);
  } else if (!shouldRun && autoRefreshTimer) {
    clearInterval(autoRefreshTimer);
    autoRefreshTimer = null;
  }
}

function renderPendingUploads(sessions) {
  var html = "";
  for (var i = sessions.length - 1; i >= 0; i--) {
    var s = sessions[i];
    if (!isPendingUpload(s)) continue;
    var sid = s.session_id;
    var st = s.status;
    html += '<div style="padding:4px;margin:4px 0;border-bottom:1px solid #222">' +
      '<b>' + esc(s.name || "input.mp4") + '</b> <span style="color:#888">' + esc(sid) + '</span> [' + esc(st) + '] ' +
      '<button onclick="processOpenCap(\'' + jsArg(sid) + '\')">Send to OpenCap API</button>' +
      ' <button onclick="deleteSession(\'' + jsArg(sid) + '\')" style="background:#633;font-size:11px">x</button>' +
      '</div>';
  }
  document.getElementById("pendingList").innerHTML = html || "None";
}

function renderSessions(sessions) {
  var html = "";
  for (var i = sessions.length - 1; i >= 0; i--) {
    var s = sessions[i];
    if (isPendingUpload(s)) continue;
    var sid = s.session_id;
    var st = s.status;
    var action = "";
    var isRemote = sid.startsWith("remote_");
    if (st === "processing") action = '<span class="spinner"></span> Processing... <button onclick="loadSessions()">Refresh</button>';
    else if (st === "done") action = '<button onclick="showFiles(\'' + jsArg(sid) + '\')">Files</button>';
    else if (st === "failed" && !isRemote && s.video_path) action = '<span style="color:#f44">Failed</span> <button onclick="processOpenCap(\'' + jsArg(sid) + '\')">Retry</button>';
    else if (st === "failed") action = '<span style="color:#f44">Remote failed</span>';

    var download = "";
    if (s.download_status === "downloading") download = ' <span style="color:#0cf">Downloading results</span>';
    else if (s.download_status === "failed") download = ' <span style="color:#f90">' + esc(s.note || "Result download failed") + '</span>';

    var name = esc(s.name || sid);
    var remoteTag = s.api_session_id ? ' <span style="color:#888">OpenCap</span>' : "";

    html += '<div style="padding:4px;margin:4px 0;border-bottom:1px solid #222">' +
      '<b>' + name + '</b> <span style="color:#888">' + esc(sid) + '</span> [' + esc(st) + ']' + remoteTag + download + ' ' + action +
      ' <button onclick="deleteSession(\'' + jsArg(sid) + '\')" style="background:#633;font-size:11px">x</button>' +
      '</div>';
  }
  document.getElementById("sessionsList").innerHTML = html || "None";
}

async function loadSessions(opts) {
  opts = opts || {};
  if (loadingSessions) return;
  loadingSessions = true;

  var btn = document.getElementById("btnRefresh");
  if (!opts.silent) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Refreshing...';
  }

  try {
    await rawFetch("POST", "/sessions/sync-all");
    var local = await rawFetch("GET", "/sessions");
    renderPendingUploads(local.sessions);
    renderSessions(local.sessions);
    updateAutoRefresh(local.sessions);
    if (!opts.silent) toast("Updated " + local.sessions.length + " sessions", "ok");
  } catch (e) {
    if (!opts.silent) toast("Refresh failed: " + e.message, "err");
  }

  if (!opts.silent) {
    btn.disabled = false;
    btn.innerHTML = "Refresh";
  }
  loadingSessions = false;
}

// ---- OpenCap Processing ----
async function processOpenCap(sid) {
  toast("Sent to OpenCap API. Processing started...", "info");
  rawFetch("POST", "/sessions/" + sid + "/process-opencap").then(function() {
    toast("Submitted to OpenCap API", "ok");
    loadSessions();
  }).catch(function(e) {
    toast("Processing failed: " + e.message, "err");
    loadSessions();
  });
  loadSessions();
}

// ---- Files ----
async function showFiles(sid) {
  var data = await rawFetch("GET", "/sessions/" + sid + "/files");
  if (data.error) return toast(data.error, "err");
  var html = "<b>" + esc(sid) + "</b><br>";
  for (var i = 0; i < data.files.length; i++) {
    var f = data.files[i];
    html += '<div class="file" onclick="setActive(\'' + jsArg(sid) + '\',\'' + jsArg(f.file_path) + '\',\'' + jsArg(f.file_type) + '\')">' +
      esc(f.file_name) + ' (' + esc(f.file_type) + ')</div>';
  }
  if (data.files.length === 0) {
    html += '<div class="result">No result files found</div>';
  }
  document.getElementById("filesPanel").innerHTML = html;
  if (data.files.length > 0) loadSessions({silent: true});
}

// ---- Active ----
async function setActive(sid, path, type) {
  // Fill the path automatically when a file is clicked.
  if (type === "mot") {
    document.getElementById("activeSO").value = path;
  } else {
    document.getElementById("activeIK").value = path;
  }
  saveActive();
  toast("Filled: " + path.split("/").pop(), "ok");
}

async function saveActive() {
  var ac = await rawFetch("GET", "/active-file");
  ac.file_path = document.getElementById("activeIK").value;
  ac.file_path_so = document.getElementById("activeSO").value;
  ac.receiver_host = document.getElementById("receiverHost").value;
  ac.receiver_port = parseInt(document.getElementById("trcPort").value) || 5005;
  ac.receiver_port_mot = parseInt(document.getElementById("motPort").value) || 5006;
  await rawFetch("POST", "/active-file", ac);
}

async function loadActive() {
  var data = await rawFetch("GET", "/active-file");
  document.getElementById("activeIK").value = data.file_path || "";
  document.getElementById("activeSO").value = data.file_path_so || "";
}

// ---- Delete ----
async function deleteSession(sid) {
  if (!confirm("Delete " + sid + " ?")) return;
  await rawFetch("DELETE", "/sessions/" + sid);
  toast("Deleted", "ok");
  loadSessions();
  document.getElementById("filesPanel").innerHTML = "";
  loadActive();
}

// ---- Send ----
var queueTimer = null;

async function sendActive() {
  await saveActive();

  var r = await rawFetch("POST", "/send-active-file");
  if (r.queued) {
    toast("Added to send queue (IK+SO)", "ok");
    showQueue();
    if (!queueTimer) queueTimer = setInterval(showQueue, 2000);
  } else if (r.error) {
    toast(r.error, "err");
    document.getElementById("queuePanel").innerHTML =
      '<span class="result err">' + esc(r.error) + '</span>';
  }
}

async function showQueue() {
  var q = await rawFetch("GET", "/send-queue");

  // Check results for failures
  var lastFailed = null;
  var lastDone = null;
  var results = q.results || [];
  for (var i = 0; i < results.length; i++) {
    if (results[i].status === "failed") lastFailed = results[i];
    if (results[i].status === "done") lastDone = results[i];
  }

  var hasPendingItems = q.items.length > 0;

  if (!q.sending && !hasPendingItems) {
    clearInterval(queueTimer);
    queueTimer = null;
    if (lastFailed && !lastDone) {
      document.getElementById("queuePanel").innerHTML =
        '<span class="result err">Send failed: ' + esc(lastFailed.error || "Unknown error") + '</span>';
    } else if (lastFailed && lastDone) {
      document.getElementById("queuePanel").innerHTML =
        '<span class="result ok">Send complete, but one item failed: ' + esc(lastFailed.error || "Unknown error") + '</span>';
    } else if (lastDone) {
      document.getElementById("queuePanel").innerHTML =
        '<span class="result ok">All sends complete</span>';
    } else {
      document.getElementById("queuePanel").innerHTML = 'Queue is empty';
    }
    return;
  }

  var html = "";
  for (var i = 0; i < q.items.length; i++) {
    var item = q.items[i];
    var statusIcon = "";
    if (item.status === "sending") statusIcon = '<span class="spinner"></span> ';
    else if (item.status === "failed") statusIcon = '❌ ';
    var trcName = item.trc ? item.trc.replace(/\\/g, '/').split('/').pop() : '';
    var motName = item.mot ? item.mot.replace(/\\/g, '/').split('/').pop() : '';
    var name = trcName + ' + ' + motName;
    html += '<div style="padding:3px;border-bottom:1px solid #222">' +
      statusIcon + 'IK+SO: ' + esc(name) +
      ' <button onclick="removeQueue(\'' + item.id + '\')" style="font-size:10px;padding:2px 6px;background:#633">x</button>';
    if (item.error) html += '<br><span style="color:#f44;font-size:12px">' + esc(item.error) + '</span>';
    html += '</div>';
  }
  if (q.sending && q.items.length === 0) {
    html = '<span class="spinner"></span> Sending...';
  }
  document.getElementById("queuePanel").innerHTML = html || 'Queue is empty';
}

async function removeQueue(id) {
  await rawFetch("DELETE", "/send-queue/" + id);
  showQueue();
}

loadSessions();
loadActive();
</script>
</body>
</html>
